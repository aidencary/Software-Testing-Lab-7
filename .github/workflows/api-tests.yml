# api-tests.yml
# The MIDDLE tier of the pipeline. Runs Postman/Newman API tests against a
# LIVE backend booted by the workflow itself.

name: API Tests

# Trigger on PRs and pushes to main, plus manual trigger option.
on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Permissions: Newman generates test results we want to publish as a Check on the PR, so we need `checks: write`.
# The workflow doesn't need to read or write code, but it does need to read the repo to get the Postman collection 
# and boot the backend, so we give it `contents: read`.
permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:

  # This job uses the latest Ubuntu runner, which has Java, Node, and curl pre-installed.
  api-tests:
    name: API tests (Postman / Newman)
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      # Backend is a Maven project, so we need JDK 25 to boot it.
      - name: Set up JDK 25 (Temurin) with Maven cache
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'

      # Node is needed because Newman (the Postman CLI runner) is an npm package.
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install Newman plus two reporters:
      # - htmlextra -> a pretty HTML dashboard (uploaded as artifact below)
      # - junitfull -> a JUnit XML file publishable via the Checks API
      - name: Install Newman + reporters
        run: npm install -g newman newman-reporter-htmlextra newman-reporter-junitfull

      # Boot Spring Boot in the background. `&` + `disown` releases the PID so
      # the step finishes instead of waiting forever. Logs redirect to a file
      # we can `cat` if the wait step times out.
      - name: Start Spring Boot backend in background
        working-directory: ./backend
        run: |
          nohup mvn -B spring-boot:run > ../backend-run.log 2>&1 &
          echo $! > ../backend.pid

      # Poll /api/courses until it returns 200, up to 120 seconds.
      # If it never comes up, dump the backend log so the failure is diagnosable.
      - name: Wait for backend to be ready
        run: |
          timeout 120 bash -c 'until curl -sf http://localhost:8081/api/courses > /dev/null; do sleep 2; done' \
            || { echo "Backend never started. Log follows:"; cat backend-run.log; exit 1; }

      # Run the Postman collection against the live backend.
      # Three reporters at once:
      #   cli        -> readable output in the step log
      #   htmlextra  -> beautiful standalone HTML dashboard
      #   junitfull  -> XML for the GitHub Checks API
      - name: Run Postman collection with Newman
        run: |
          mkdir -p api-tests/results
          newman run api-tests/student-reg.postman_collection.json \
            -r cli,htmlextra,junitfull \
            --reporter-htmlextra-export api-tests/results/report.html \
            --reporter-junitfull-export api-tests/results/junit.xml

      # Publish the JUnit XML so pass/fail appears on the PR as a Check.
      - name: Publish API test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          check_name: API Test Results
          files: api-tests/results/junit.xml

      # Upload the pretty HTML dashboard. Reviewers can download + open it.
      - name: Upload HTML test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-html-report
          path: api-tests/results/report.html

      # Always stop the backend at the end so the runner's Java process doesn't
      # leak between steps if we add more later.
      - name: Stop Spring Boot backend
        if: always()
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) 2>/dev/null || true
          fi
